# GitHub Actions equivalent of the GitLab pipeline in .gitlab-ci.yml.
# Same job graph: lint -> test -> e2e -> build (-> release on main).
#
# The image is published to GitHub Container Registry (ghcr.io). The
# default GITHUB_TOKEN already has packages:write on the repository, so
# no extra secret is required.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      # `continue-on-error` mirrors the gitlab-ci `allow_failure: true`:
      # style violations don't block the rest of the pipeline.
      - name: RuboCop
        continue-on-error: true
        run: bundle exec rubocop --parallel --format progress

  sorbet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Sorbet type-check
        continue-on-error: true
        run: bundle exec srb tc

  rspec:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pantria_test
          MYSQL_USER: pantria
          MYSQL_PASSWORD: pantria
        ports: ["3306:3306"]
        # The official mysql image exposes a healthcheck via mysqladmin.
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -proot --silent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      RAILS_ENV: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "3306"
      DATABASE_USERNAME: pantria
      DATABASE_PASSWORD: pantria
      DATABASE_NAME: pantria_test
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: System deps for Tesseract specs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng tesseract-ocr-deu \
            poppler-utils imagemagick
      - name: Prepare DB
        run: bundle exec rails db:prepare
      - name: RSpec
        run: bundle exec rspec --format progress --format RspecJunitFormatter --out tmp/rspec.xml
      - name: Upload JUnit + coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rspec-results
          path: |
            tmp/rspec.xml
            coverage/

  cypress:
    runs-on: ubuntu-latest
    # No `needs:` -- cypress fans out in parallel with rspec. The two
    # cost roughly the same wall-clock and have no shared state (rspec
    # uses a GitHub-services MySQL; cypress brings up its own stack
    # via docker-compose.test.yml), so chaining them just doubled the
    # pipeline length for no gain.
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e stack via docker compose
        # The compose file builds + starts cypress, which depends on
        # db -> app-e2e. `--abort-on-container-exit --exit-code-from cypress`
        # surfaces cypress's exit status as the job result.
        run: |
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit --exit-code-from cypress cypress
      - name: Extract Cypress artifacts
        if: always()
        run: |
          mkdir -p cypress/{junit,screenshots,videos}
          docker compose -f docker-compose.test.yml cp cypress:/e2e/cypress/junit/.       cypress/junit/       || true
          docker compose -f docker-compose.test.yml cp cypress:/e2e/cypress/screenshots/. cypress/screenshots/ || true
          docker compose -f docker-compose.test.yml cp cypress:/e2e/cypress/videos/.      cypress/videos/      || true
          docker compose -f docker-compose.test.yml down --volumes --remove-orphans || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress
          path: |
            cypress/junit/
            cypress/screenshots/
            cypress/videos/

  build-image:
    runs-on: ubuntu-latest
    needs: [rspec, cypress]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ghcr.io/sgraef/pantria:${{ github.sha }}
            ghcr.io/sgraef/pantria:main
            ghcr.io/sgraef/pantria:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
