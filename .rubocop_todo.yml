# Homestead RuboCop ratchet baseline (ROADMAP M0c, CI ratchet part 1).
#
# Regenerated with `rubocop --auto-gen-config` after the todos+calendar
# features (#11, #12) merged into main, so it grandfathers the offenses that
# already existed when RuboCop was made BLOCKING. The build fails only on NEW
# offenses. Burn these down over time and delete the entries as you go.
#
# NOTE: Layout/LineLength is grandfathered in .rubocop.yml's own
# `Layout/LineLength: Exclude` instead of here — its explicit `Max: 120`
# there overrides any Max we set in this inherited file.

# Offense count: 1
# This cop supports safe autocorrection (--autocorrect).
Layout/EmptyLineAfterGuardClause:
  Exclude:
    - 'app/services/german_date_extractor.rb'

