# Keyword → German category mapping for OfferCategorizer.
#
# Each category lists German keywords matched as case-insensitive
# substrings against an offer's title. The first match wins, walking
# categories top-to-bottom and keywords within a category by length
# descending (so "Hähnchenbrust" matches the more specific keyword
# before bare "Brust" if both exist).
#
# Add / refine entries here when you spot mis-categorised offers --
# this is the cheapest, most predictable lever for offer-grouping
# quality. The Rails app loads this file once at boot; restart the
# `web` and `worker` containers to pick up changes.

# NOTE: Category order matters. Brand-rich categories (Süßigkeiten,
# Snacks) are checked first so brand names like "Milka" or "Haribo"
# win over generic ingredient words ("Vollmilch") that would otherwise
# pull a "Milka Tafel Vollmilch" into Milch & Käse.

"Süßigkeiten":
  - schokolade
  - schoko
  - praline
  - bonbon
  - gummi
  - lakritz
  - lutscher
  - pralinés
  - keks
  - waffel
  - oblate
  - kuchen
  - torte
  - glühwürmchen
  - haribo
  - milka
  - ritter
  - lindt
  - kinder

