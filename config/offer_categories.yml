# Fisch before Fleisch so titles like "Lachsfilet" route to fish via
# `lachs` rather than being claimed by a generic meat keyword. (Bare
# `filet` is intentionally absent from Fleisch -- "Schnitzel" /
# "Hähnchen" / etc. catch the meat cuts; "filet" alone is too generic.)
