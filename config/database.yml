default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "pantria" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "pantria" } %>
  host:     <%= ENV.fetch("DATABASE_HOST") { "127.0.0.1" } %>
  port:     <%= ENV.fetch("DATABASE_PORT") { 3306 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "homestead_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "homestead_test" } %>

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "homestead_production" } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") %>
