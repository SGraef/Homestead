# Solid Queue picks this up automatically when the worker boots. Add new
# recurring jobs here as needed.
default: &default
  bring_pull_all:
    class: BringPullAllJob
    schedule: every 5 minutes
    queue: default
    description: "Pull each connected household's Bring! list and reconcile."

  sync_all_offers:
    class: SyncAllOffersJob
    # Marktguru flyers refresh weekly; once a day is plenty and keeps us
    # well below any unwritten rate-limit ceiling.
    schedule: every day at 4am
    queue: default
    description: "Pull current Marktguru offers for every household with a postcode."

  poll_inbound_receipts:
    class: PollInboundReceiptsJob
    # Forwarding-via-email cadence -- short enough that uploads feel
    # snappy, long enough not to hammer the IMAP server. No-ops when
    # RECEIPT_IMAP_* env vars aren't configured.
    schedule: every 5 minutes
    queue: default
    description: "Drain the configured IMAP mailbox into pending receipts."

  calendar_poll:
    class: CalendarPollJob
    # Pull remote calendar changes (incremental via syncToken). 5 min matches the
    # other pollers; no-op unless a calendar is connected.
    schedule: every 5 minutes
    queue: default
    description: "Pull external calendar changes into local events."

  scan_expiry_reminders:
    class: ScanExpiryRemindersJob
    # Once a day in the morning: turns storage `expires_on` dates into bell +
    # push notifications. Deduped per item/date, so a daily cadence never spams.
    schedule: every day at 8am
    queue: default
    description: "Notify members about storage items expiring soon or just expired."

development:
  <<: *default

production:
  <<: *default
