# Solid Queue worker layout.
#
# Two worker pools so a slow receipt OCR can't head-of-line block
# the fast recurring jobs (Bring sync, IMAP poll, offer sync, …) --
# and so framework-internal queues (Active Storage purge/analysis,
# Action Mailbox routing/incineration, mailers) get drained
# automatically without us having to enumerate every name.
#
# default worker
#   - serves every queue EXCEPT `receipts` (Solid Queue's `!queue`
#     pattern). New queues we add later get picked up here for free.
#   - 5 threads, plenty for short-lived stuff.
#
# receipts worker
#   - serves only the `receipts` queue (ProcessReceiptJob).
#   - 1 thread to keep CPU pressure predictable: tesseract is
#     already internally parallel (further capped by
#     OCR_THREAD_LIMIT), so running multiple OCR jobs at once just
#     thrashes the cores.
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: ["*", "!receipts"]
      threads: 5
      processes: 1
      polling_interval: 0.1
    - queues: ["receipts"]
      threads: 1
      processes: 1
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
