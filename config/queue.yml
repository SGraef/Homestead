# Solid Queue worker layout.
#
# Two worker pools so a slow receipt OCR can't head-of-line block
# the fast recurring jobs (Bring sync, IMAP poll, offer sync, …).
#
# default workers
#   - serve the `default` queue
#   - 5 threads = plenty for short-lived stuff
#
# receipts worker
#   - serves only the `receipts` queue (ProcessReceiptJob)
#   - 1 thread to keep CPU pressure predictable: tesseract is
#     already internally parallel, so running multiple OCR jobs at
#     once just thrashes the cores. Bump if you have a beefy host
#     and lots of receipts arriving in bursts.
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: ["default"]
      threads: 5
      processes: 1
      polling_interval: 0.1
    - queues: ["receipts"]
      threads: 1
      processes: 1
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
