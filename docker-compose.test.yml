# Spin up an isolated test environment.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --build app      # rspec + sorbet
#   docker compose -f docker-compose.test.yml up --build cypress  # e2e suite
#
# No bind mounts -- the docker daemon used in CI (dind) can't see the
# runner's filesystem, so any `.:/app` style mount would shadow the
# baked-in code with an empty directory. Every service that needs the
# source builds an image that COPYs the code in. Local iteration costs
# a rebuild per change; with the Gemfile layer cached that's a few
# seconds.
services:
  db:
    image: mysql:8.4
    # MySQL 8.4 defaults to caching_sha2_password and removed the
    # --default-authentication-plugin flag, so no command override.
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: homestead_test
      MYSQL_USER: pantria
      MYSQL_PASSWORD: pantria
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot --silent"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: test
      DATABASE_HOST: db
      DATABASE_USERNAME: pantria
      DATABASE_PASSWORD: pantria
      DATABASE_NAME: homestead_test
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "bundle exec rails db:prepare &&
                bundle exec rspec &&
                bundle exec srb tc"

  cypress:
    build:
      context: .
      dockerfile: Dockerfile.cypress
    environment:
      CYPRESS_BASE_URL: http://app-e2e:3000
    depends_on:
      app-e2e:
        condition: service_healthy

  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      # Use root so db:prepare can CREATE DATABASE homestead_e2e on
      # first run -- the regular `pantria` user only has rights to
      # the homestead_test DB the mysql image auto-creates from
      # MYSQL_DATABASE.
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: homestead_e2e
      DISABLE_SPRING: "1"
    command: >
      bash -lc "bundle exec rails db:prepare db:seed &&
                bundle exec rails server -b 0.0.0.0 -p 3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/up"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      db:
        condition: service_healthy
