# Spin up an isolated test environment.
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit
services:
  db:
    image: mysql:8.4
    # MySQL 8.4 defaults to caching_sha2_password and removed the
    # --default-authentication-plugin flag, so no command override.
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pantria_test
      MYSQL_USER: pantria
      MYSQL_PASSWORD: pantria
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot --silent"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: test
      DATABASE_HOST: db
      DATABASE_USERNAME: pantria
      DATABASE_PASSWORD: pantria
      DATABASE_NAME: pantria_test
    volumes:
      - .:/app
      - bundle_cache_test:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "bundle exec rails db:prepare &&
                bundle exec rspec &&
                bundle exec srb tc"

  cypress:
    image: cypress/included:13.15.0
    working_dir: /e2e
    environment:
      CYPRESS_BASE_URL: http://app-e2e:3000
    volumes:
      - .:/e2e
    depends_on:
      app-e2e:
        condition: service_healthy
    # Install JUnit reporters before launching Cypress -- the
    # cypress/included image ships cypress baked in but no node
    # modules, and cypress.config.js requires `cypress-multi-reporters`
    # + `mocha-junit-reporter` at load time.
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - npm install --silent --no-audit --no-fund &&
        cypress run --browser chrome

  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USERNAME: pantria
      DATABASE_PASSWORD: pantria
      DATABASE_NAME: pantria_e2e
      DISABLE_SPRING: "1"
    command: >
      bash -lc "bundle exec rails db:prepare db:seed &&
                bundle exec rails server -b 0.0.0.0 -p 3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/up"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      db:
        condition: service_healthy

volumes:
  bundle_cache_test:
